version: '3.8'

services:
  db:
    image: joesmithessang/mysql:v1.0
    container_name: db_server
    environment:
      MYSQL_ROOT_PASSWORD: pw
    networks:
      - clo835-network

  blue:
    image: joesmithessang/webapp:v1.0

    container_name: blue
    restart: always
    ports:
      - "8081:8080"
    environment:
      DBHOST: db_server
      DBPORT: 3306
      DBUSER: root
      DBPWD: pw
      APP_COLOR: blue
    networks:
      - clo835-network
    depends_on:
      - db

  pink:
    image: joesmithessang/webapp:v1.0
    container_name: pink
    restart: always
    ports:
      - "8082:8080"
    environment:
      DBHOST: db_server
      DBPORT: 3306
      DBUSER: root
      DBPWD: pw
      APP_COLOR: pink
    networks:
      - clo835-network
    depends_on:
      - db

  lime:
    image: joesmithessang/webapp:v1.0
    container_name: lime
    restart: always
    ports:
      - "8083:8080"
    environment:
      DBHOST: db_server
      DBPORT: 3306
      DBUSER: root
      DBPWD: pw
      APP_COLOR: lime
    networks:
      - clo835-network
    depends_on:
      - db

networks:
  clo835-network:
    driver: bridge
